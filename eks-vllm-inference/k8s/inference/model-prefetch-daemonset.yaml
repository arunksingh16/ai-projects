apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-prefetch
  namespace: inference
  labels:
    app: model-prefetch
spec:
  selector:
    matchLabels:
      app: model-prefetch
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: model-prefetch
    spec:
      serviceAccountName: vllm   # reuses existing IRSA role → S3 read access
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      nodeSelector:
        workload: gpu

      containers:
        - name: model-prefetch
          image: amazon/aws-cli:latest
          command:
            - /bin/sh
            - -c
            - |
              TARGET=/mnt/models/mistral-7b-instruct-v0.2
              SENTINEL="$TARGET/.model_ready"

              if [ -f "$SENTINEL" ]; then
                echo "Model already cached at $TARGET — nothing to do."
              else
                echo "Downloading model from s3://$(MODEL_BUCKET)/models/mistral-7b-instruct-v0.2/ ..."
                mkdir -p "$TARGET"
                aws s3 sync "s3://$(MODEL_BUCKET)/models/mistral-7b-instruct-v0.2/" "$TARGET/" \
                  --no-progress
                # Write sentinel only after a clean, complete download
                touch "$SENTINEL"
                echo "Download complete. Sentinel written at $SENTINEL"
              fi

              # Keep the container alive so the DaemonSet pod stays Running.
              # Kubernetes requires DaemonSet containers to run indefinitely.
              exec sleep infinity
          env:
            - name: MODEL_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: vllm-config
                  key: model_bucket
          volumeMounts:
            - name: model-cache
              mountPath: /mnt/models
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "1"
              memory: "4Gi"

      volumes:
        - name: model-cache
          hostPath:
            path: /mnt/models        # lives on the 200 GB EBS root volume
            type: DirectoryOrCreate

# How this works:
#   1. On node join, this DaemonSet pod starts and downloads the model once to
#      /mnt/models/mistral-7b-instruct-v0.2/ on the node's EBS root volume.
#   2. A sentinel file (.model_ready) is written only after a successful, complete
#      download — this prevents a partial download from being used.
#   3. On subsequent starts (pod crash, node reboot, rolling update) the sentinel
#      is found and the download is skipped immediately.
#   4. The vllm Deployment mounts the same hostPath so the init container finds
#      the sentinel and skips S3 sync → only VRAM load time (~90-120s) remains.
#   5. Because this DaemonSet targets all GPU nodes (nodeSelector: workload=gpu),
#      every GPU node in the 1-3 node group is pre-warmed. HPA scale-out to a
#      new node will still incur one download, but all subsequent pod restarts
#      on that node are instant.
