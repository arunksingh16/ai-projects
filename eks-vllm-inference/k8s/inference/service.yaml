apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: inference
  labels:
    app: vllm-inference
  annotations:
    # Expose Prometheus metrics from this service
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP  # ALB Ingress handles external traffic; service stays internal
  selector:
    app: vllm-inference
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
