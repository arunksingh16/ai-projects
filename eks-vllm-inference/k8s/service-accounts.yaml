# Apply namespaces first: kubectl apply -f k8s/namespaces.yaml
# Then fill in the role ARNs from CDK outputs and apply this file:
#   kubectl apply -f k8s/service-accounts.yaml

apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm
  namespace: inference
  annotations:
    # Replace with VllmRoleArn from: cdk deploy EksStack --outputs-file outputs.json
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account>:role/<role-name>"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
  annotations:
    # Replace with OtelCollectorRoleArn from: cdk deploy EksStack --outputs-file outputs.json
    eks.amazonaws.com/role-arn: "arn:aws:iam::<account>:role/<role-name>"
